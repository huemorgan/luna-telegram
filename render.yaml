# Multi-account Telegram gateway. luna-service provisions one encrypted bot
# account per agent through the admin API.
services:
  - type: web
    name: luna-tg-gateway
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    dockerContext: ./gateway
    plan: starter
    region: oregon
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: TELEGRAM_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GATEWAY_ADMIN_KEY
        sync: false
      - key: PUBLIC_URL
        value: https://luna-tg-gateway.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: luna-tg-db
          property: connectionString

databases:
  - name: luna-tg-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
